name: Release On Tag

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (EAS)
        run: |
          npx eas build --platform android --profile production --non-interactive --wait --json > android-build.json

      - name: Build iOS (EAS)
        run: |
          npx eas build --platform ios --profile production --non-interactive --wait --json > ios-build.json

      - name: Download build artifacts
        run: |
          mkdir -p artifacts
          TAG_NAME="${GITHUB_REF_NAME}"

          ANDROID_URL=$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('android-build.json','utf8'));console.log(data[0]?.artifacts?.buildUrl || data.artifacts?.buildUrl || '');")
          IOS_URL=$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('ios-build.json','utf8'));console.log(data[0]?.artifacts?.buildUrl || data.artifacts?.buildUrl || '');")

          if [ -z "$ANDROID_URL" ]; then
            echo "Android build artifact URL not found" >&2
            exit 1
          fi
          if [ -z "$IOS_URL" ]; then
            echo "iOS build artifact URL not found" >&2
            exit 1
          fi

          curl -L "$ANDROID_URL" -o "artifacts/driftBrowser.apk"
          curl -L "$IOS_URL" -o "artifacts/driftBrowser.ipa"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/driftBrowser.apk
            artifacts/driftBrowser.ipa
